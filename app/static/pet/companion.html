<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HealthDesk Agent Companion</title>
    <link rel="stylesheet" href="/static/pet/companion.css?v=20260616-env" />
  </head>
  <body>
    <main class="companion-desktop" id="companionDesktop">
      <section class="pet-widget" id="petWidget" aria-label="HealthDesk 桌宠小灵">
        <section class="pet-dialog hidden" id="petDialog" aria-live="polite">
          <form class="chat-form" id="chatForm">
            <div class="dialog-head">
              <strong>小灵</strong>
              <div class="size-controls" id="sizeControls" aria-label="桌宠大小">
                <button type="button" data-size-preset="small">小</button>
                <button type="button" data-size-preset="medium">中</button>
                <button type="button" data-size-preset="large">大</button>
                <button type="button" data-size-preset="xlarge">超大</button>
              </div>
              <button class="icon-button" id="closeDialog" type="button" aria-label="关闭">×</button>
            </div>
            <textarea
              id="chatInput"
              rows="3"
              autocomplete="off"
              placeholder="和小灵说点什么..."
              aria-label="输入给 Agent 的消息"
            ></textarea>
            <div class="dialog-actions">
              <span id="dialogStatus">Ready</span>
              <button class="send-button" id="sendChat" type="submit">发送</button>
            </div>
          </form>
          <div class="reply-box hidden" id="replyBox"></div>
        </section>

        <div class="pet-visual" aria-hidden="true">
          <div class="heart-layer" id="heartLayer"></div>
          <canvas
            class="pet-canvas"
            id="petCanvas"
            width="220"
            height="220"
            data-normal-src="/pet/assets/corgi_normal.png"
            data-excited-src="/pet/assets/corgi_ears_up.png"
          ></canvas>
        </div>
        <div class="pet-name" aria-hidden="true">小灵</div>
      </section>

      <nav class="context-menu hidden" id="petContextMenu" aria-label="桌宠菜单">
        <button type="button" id="contextEnvironmentSettings">设置环境适宜区间</button>
        <button type="button" id="contextCycleSize">切换大小</button>
      </nav>

      <section
        class="settings-backdrop hidden"
        id="environmentSettingsModal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="environmentSettingsTitle"
      >
        <form class="settings-panel" id="environmentSettingsForm">
          <div class="settings-head">
            <strong id="environmentSettingsTitle">环境阈值</strong>
            <button class="icon-button" id="closeEnvironmentSettings" type="button" aria-label="关闭">×</button>
          </div>

          <div class="settings-grid">
            <fieldset>
              <legend>适宜温度</legend>
              <label>
                下限
                <input name="temperature_comfort_min_c" type="number" min="10" max="35" step="0.1" required />
              </label>
              <label>
                上限
                <input name="temperature_comfort_max_c" type="number" min="10" max="35" step="0.1" required />
              </label>
            </fieldset>

            <fieldset>
              <legend>重点监测温度</legend>
              <label>
                低温
                <input name="temperature_warning_low_c" type="number" min="0" max="40" step="0.1" required />
              </label>
              <label>
                高温
                <input name="temperature_warning_high_c" type="number" min="0" max="45" step="0.1" required />
              </label>
            </fieldset>

            <fieldset>
              <legend>适宜湿度</legend>
              <label>
                下限
                <input name="humidity_comfort_min_percent" type="number" min="0" max="100" step="1" required />
              </label>
              <label>
                上限
                <input name="humidity_comfort_max_percent" type="number" min="0" max="100" step="1" required />
              </label>
            </fieldset>

            <fieldset>
              <legend>重点监测湿度</legend>
              <label>
                低湿
                <input name="humidity_warning_low_percent" type="number" min="0" max="100" step="1" required />
              </label>
              <label>
                高湿
                <input name="humidity_warning_high_percent" type="number" min="0" max="100" step="1" required />
              </label>
            </fieldset>
          </div>

          <div class="settings-actions">
            <span id="environmentSettingsStatus"></span>
            <div>
              <button class="ghost-button" id="cancelEnvironmentSettings" type="button">取消</button>
              <button class="send-button" id="saveEnvironmentSettings" type="submit">确认保存</button>
            </div>
          </div>
        </form>
      </section>
    </main>

    <script src="/static/pet/companion.js?v=20260616-env"></script>
  </body>
</html>
